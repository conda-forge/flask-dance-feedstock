{% set name = "Flask-Dance" %}
{% set version = "7.1.0" %}
{% set sha256 = "6d0510e284f3d6ff05af918849791b17ef93a008628ec33f3a80578a44b51674" %}
{% set build_number = 0 %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_').lower() }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: {{ build_number }}
  noarch: python
  script: "{{ PYTHON }} -m pip install --no-deps . -vv"

requirements:
  host:
    - python >=3.7
    - pip
    - flit-core >=3.2, <4
  run:
    - python >=3.7
    - requests >=2.0
    - oauthlib >=3.2
    - requests-oauthlib >=1.0.0
    - Flask >=2.0.3
    - urlobject
    - Werkzeug

test:
  imports:
    - flask_dance
    - flask_dance.consumer
    - flask_dance.consumer.storage
    - flask_dance.contrib

about:
  home: https://pypi.org/project/Flask-Dance/
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Doing the OAuth dance with style using Flask, requests, and oauthlib.'

  doc_url: http://flask-dance.readthedocs.io/
  dev_url: https://github.com/singingwolfboy/flask-dance

extra:
  recipe-maintainers:
    - rmarow
    - ericcina
